<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Test Incident Room — ISO 29119-2</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="wrap">

  <!-- AUTH -->
  <div id="auth" class="screen active">
    <div class="auth-panel">
      <h1>Test Incident Room</h1>

      <div class="auth-tabs">
        <button onclick="switchAuthTab('login')">Login</button>
        <button onclick="switchAuthTab('register')">Register</button>
      </div>

      <div id="tab-login">
        <input id="li-user" placeholder="Username" />
        <input id="li-pass" type="password" placeholder="Password" />
        <button onclick="doLogin()">Login</button>
      </div>

      <div id="tab-register" style="display:none;">
        <input id="rg-name" placeholder="Name" />
        <input id="rg-user" placeholder="Username" />
        <input id="rg-pass" type="password" placeholder="Password" />
        <button onclick="doRegister()">Register</button>
      </div>
    </div>
  </div>

  <!-- INTRO -->
  <div id="intro" class="screen">
    <h2>Welcome</h2>
    <button onclick="showScreen('difficulty')">Play</button>
    <button onclick="showScreen('leaderboard')">Leaderboard</button>
  </div>

  <!-- DIFFICULTY -->
  <div id="difficulty" class="screen">
    <h2>Difficulty</h2>
    <button onclick="startGame('easy')">Easy</button>
    <button onclick="startGame('medium')">Medium</button>
    <button onclick="startGame('hard')">Hard</button>
  </div>

  <!-- GAME -->
  <div id="room" class="screen">
    <div>Score: <span id="h-score">0</span></div>
    <div>Time: <span id="h-time">00:00</span></div>
    <div id="feed"></div>
    <div id="logbox"></div>
  </div>

  <!-- RESULT -->
  <div id="result" class="screen">
    <h2 id="r-title"></h2>
    <p id="r-msg"></p>
    <div>Score: <span id="r-score"></span></div>
    <button onclick="showScreen('leaderboard')">Leaderboard</button>
  </div>

  <!-- LEADERBOARD -->
  <div id="leaderboard" class="screen">
    <h2>Leaderboard</h2>
    <div id="lb-list"></div>
    <button onclick="showScreen('intro')">Back</button>
  </div>

</div>

</body>
</html>
